# Blueprint Render (plan de pago) — web + PostgreSQL infinity-bajas

services:
  - type: web
    name: infinity-bajas
    runtime: node
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    buildCommand: npm ci && npx prisma db push && npm run db:seed && npm run render:build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: infinity-bajas
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false

databases:
  - name: infinity-bajas
    plan: starter
    region: oregon
    databaseName: infinity_bajas
    user: infinity
