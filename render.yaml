# Blueprint Render — https://render.com/docs/blueprint-spec
# Conectar repo GitHub y usar "New > Blueprint" para desplegar web + PostgreSQL.

services:
  - type: web
    name: infinity-bajas
    runtime: node
    plan: free
    region: oregon
    healthCheckPath: /api/health
    buildCommand: npm ci && npx prisma db push && npm run db:seed && npm run render:build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: infinity-bajas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false

databases:
  - name: infinity-bajas-db
    plan: free
    region: oregon
    databaseName: infinity_bajas
    user: infinity
